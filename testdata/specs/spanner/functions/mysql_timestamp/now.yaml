spec: docs/specs/spanner/functions/mysql_timestamp/now.md
dialect: spanner
# NOW returns the current TIMESTAMP at evaluation time. Positive
# Unix time is the testable property.
cases:
  - desc: NOW is after the Unix epoch
    sql: SELECT mysql.now() > TIMESTAMP '1970-01-01 00:00:00 UTC' AS r
    expected:
      rows:
        - [true]
