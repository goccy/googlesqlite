spec: docs/specs/spanner/functions/graph/nodes.md
dialect: spanner
cases:
  - desc: single-hop path exposes both endpoints in the NODES array
    setup:
      - 'CREATE TABLE IF NOT EXISTS NP_P (id INT64 PRIMARY KEY NOT ENFORCED, name STRING)'
      - 'CREATE TABLE IF NOT EXISTS NP_K (src_id INT64, dst_id INT64, PRIMARY KEY (src_id, dst_id) NOT ENFORCED)'
      - "INSERT OR IGNORE INTO NP_P VALUES (1, 'Alice'), (2, 'Bob')"
      - 'INSERT OR IGNORE INTO NP_K VALUES (1, 2)'
      - 'CREATE OR REPLACE PROPERTY GRAPH NP_G NODE TABLES (NP_P AS P PROPERTIES (id, name)) EDGE TABLES (NP_K AS K SOURCE KEY (src_id) REFERENCES P (id) DESTINATION KEY (dst_id) REFERENCES P (id))'
    sql: |-
      GRAPH NP_G MATCH p = (a:P)-[k:K]->(b:P) RETURN ARRAY_LENGTH(NODES(p)) AS n_count
    expected:
      rows:
        - [2]
