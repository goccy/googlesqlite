spec: docs/specs/spanner/functions/graph/is_acyclic.md
dialect: spanner
cases:
  - desc: two-node path is acyclic
    setup:
      - 'CREATE TABLE IF NOT EXISTS AC_P (id INT64 PRIMARY KEY NOT ENFORCED, name STRING)'
      - 'CREATE TABLE IF NOT EXISTS AC_K (src_id INT64, dst_id INT64, PRIMARY KEY (src_id, dst_id) NOT ENFORCED)'
      - 'INSERT OR IGNORE INTO AC_P VALUES (1, ''Alice''), (2, ''Bob'')'
      - 'INSERT OR IGNORE INTO AC_K VALUES (1, 2)'
      - 'CREATE OR REPLACE PROPERTY GRAPH AC_G NODE TABLES (AC_P AS P PROPERTIES (id, name)) EDGE TABLES (AC_K AS K SOURCE KEY (src_id) REFERENCES P (id) DESTINATION KEY (dst_id) REFERENCES P (id))'
    sql: |-
      GRAPH AC_G MATCH p = (a:P)-[k:K]->(b:P) RETURN IS_ACYCLIC(p) AS acy
    expected:
      rows:
        - [true]
