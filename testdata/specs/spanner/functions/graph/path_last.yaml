spec: docs/specs/spanner/functions/graph/path_last.md
dialect: spanner
cases:
  - desc: single-hop path returns the destination node's element id
    setup:
      - 'CREATE TABLE IF NOT EXISTS PL2_P (id INT64 PRIMARY KEY NOT ENFORCED, name STRING)'
      - 'CREATE TABLE IF NOT EXISTS PL2_K (src_id INT64, dst_id INT64, PRIMARY KEY (src_id, dst_id) NOT ENFORCED)'
      - "INSERT OR IGNORE INTO PL2_P VALUES (1, 'Alice'), (2, 'Bob')"
      - 'INSERT OR IGNORE INTO PL2_K VALUES (1, 2)'
      - 'CREATE OR REPLACE PROPERTY GRAPH PL2_G NODE TABLES (PL2_P AS P PROPERTIES (id, name)) EDGE TABLES (PL2_K AS K SOURCE KEY (src_id) REFERENCES P (id) DESTINATION KEY (dst_id) REFERENCES P (id))'
    sql: |-
      GRAPH PL2_G MATCH p = (a:P)-[k:K]->(b:P) RETURN ELEMENT_ID(PATH_LAST(p)) AS last_id
    expected:
      rows:
        - ['2']
