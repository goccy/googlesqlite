spec: docs/specs/spanner/functions/graph/destination_node_id.md
dialect: spanner
cases:
  - desc: destination-side FK value of an edge
    setup:
      - 'CREATE TABLE IF NOT EXISTS DN_P (id INT64 PRIMARY KEY NOT ENFORCED, name STRING)'
      - 'CREATE TABLE IF NOT EXISTS DN_K (src_id INT64, dst_id INT64, PRIMARY KEY (src_id, dst_id) NOT ENFORCED)'
      - 'INSERT OR IGNORE INTO DN_P VALUES (1, ''Alice''), (2, ''Bob'')'
      - 'INSERT OR IGNORE INTO DN_K VALUES (1, 2)'
      - 'CREATE OR REPLACE PROPERTY GRAPH DN_G NODE TABLES (DN_P AS P PROPERTIES (id, name)) EDGE TABLES (DN_K AS K SOURCE KEY (src_id) REFERENCES P (id) DESTINATION KEY (dst_id) REFERENCES P (id))'
    sql: |-
      GRAPH DN_G MATCH (a:P)-[k:K]->(b:P) RETURN DESTINATION_NODE_ID(k) AS d
    expected:
      rows:
        - ['2']
