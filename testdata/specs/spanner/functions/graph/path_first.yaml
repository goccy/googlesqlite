spec: docs/specs/spanner/functions/graph/path_first.md
dialect: spanner
cases:
  - desc: single-hop path returns the source node's element id
    setup:
      - 'CREATE TABLE IF NOT EXISTS PF_P (id INT64 PRIMARY KEY NOT ENFORCED, name STRING)'
      - 'CREATE TABLE IF NOT EXISTS PF_K (src_id INT64, dst_id INT64, PRIMARY KEY (src_id, dst_id) NOT ENFORCED)'
      - "INSERT OR IGNORE INTO PF_P VALUES (1, 'Alice'), (2, 'Bob')"
      - 'INSERT OR IGNORE INTO PF_K VALUES (1, 2)'
      - 'CREATE OR REPLACE PROPERTY GRAPH PF_G NODE TABLES (PF_P AS P PROPERTIES (id, name)) EDGE TABLES (PF_K AS K SOURCE KEY (src_id) REFERENCES P (id) DESTINATION KEY (dst_id) REFERENCES P (id))'
    sql: |-
      GRAPH PF_G MATCH p = (a:P)-[k:K]->(b:P) RETURN ELEMENT_ID(PATH_FIRST(p)) AS first_id
    expected:
      rows:
        - ['1']
