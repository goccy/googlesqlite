spec: docs/specs/spanner/functions/math/approx_dot_product.md
dialect: spanner
# Dot product is sum_i a_i * b_i. For [1,2] and [3,4]: 1*3 + 2*4 = 11.
# Source: Spanner mathematical_functions reference.
cases:
  - desc: dot product for short vectors
    sql: SELECT APPROX_DOT_PRODUCT([1.0, 2.0], [3.0, 4.0]) AS d
    expected:
      rows:
        - [11.0]
