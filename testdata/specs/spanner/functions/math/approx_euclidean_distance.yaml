spec: docs/specs/spanner/functions/math/approx_euclidean_distance.md
dialect: spanner
# Euclidean distance D = sqrt(sum_i (a_i - b_i)^2). For [1,2] and [3,4]:
# sqrt((1-3)^2 + (2-4)^2) = sqrt(4+4) = sqrt(8) = 2.8284271247461903.
# Source: Spanner mathematical_functions reference.
cases:
  - desc: euclidean distance for short vectors
    sql: SELECT APPROX_EUCLIDEAN_DISTANCE([1.0, 2.0], [3.0, 4.0]) AS d
    expected:
      rows:
        - [2.8284271247461903]
