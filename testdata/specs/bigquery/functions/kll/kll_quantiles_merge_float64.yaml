spec: docs/specs/bigquery/functions/kll/kll_quantiles_merge_float64.md
dialect: bigquery
cases:
  - desc: merge_float64 returns ARRAY of quantiles
    sql: SELECT ARRAY_LENGTH(KLL_QUANTILES.MERGE_FLOAT64(s, 4)) FROM (SELECT KLL_QUANTILES.INIT_FLOAT64(x) AS s FROM UNNEST([1.0,2.0]) AS x)
    expected:
      rows:
        - [5]
