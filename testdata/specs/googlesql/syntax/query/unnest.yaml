spec: docs/specs/googlesql/syntax/query/unnest.md
dialect: googlesql
# Covers UNNEST basics plus the LEFT-JOIN-with-empty-array case and
# UNNEST over STRUCT[]. These exercise the join-condition path that
# the downstream fork specifically patched.
cases:
  - desc: UNNEST expands an INT64 array
    sql: SELECT v FROM UNNEST([10, 20, 30]) AS v ORDER BY v
    expected:
      rows:
        - [10]
        - [20]
        - [30]
  - desc: UNNEST WITH OFFSET exposes the index
    sql: |-
      SELECT v, o
      FROM UNNEST([10, 20, 30]) AS v WITH OFFSET AS o
      ORDER BY o
    expected:
      rows:
        - [10, 0]
        - [20, 1]
        - [30, 2]
  - desc: LEFT JOIN against an empty array preserves the outer row
    sql: |-
      SELECT a, v
      FROM (SELECT 'x' AS a) ox
      LEFT JOIN UNNEST(CAST([] AS ARRAY<INT64>)) AS v ON TRUE
    expected:
      rows:
        - ['x', null]
  - desc: LEFT JOIN against a non-empty array fans the outer row
    sql: |-
      SELECT a, v
      FROM (SELECT 'x' AS a) ox
      LEFT JOIN UNNEST([1, 2, 3]) AS v ON TRUE
      ORDER BY v
    expected:
      rows:
        - ['x', 1]
        - ['x', 2]
        - ['x', 3]
  - desc: correlated UNNEST — inner UNNEST references outer column
    sql: |-
      SELECT s.x, v
      FROM UNNEST([STRUCT(1 AS x, [10, 20] AS arr), STRUCT(2, [30])]) AS s,
           UNNEST(s.arr) AS v
      ORDER BY s.x, v
    expected:
      rows:
        - [1, 10]
        - [1, 20]
        - [2, 30]
  - desc: UNNEST of STRUCT[] exposes individual fields
    sql: |-
      SELECT x, y
      FROM UNNEST(ARRAY<STRUCT<x INT64, y STRING>>[(1, 'a'), (2, 'b')])
      ORDER BY x
    expected:
      rows:
        - [1, 'a']
        - [2, 'b']
  - desc: UNNEST of STRUCT[] with WITH OFFSET preserves field access
    sql: |-
      SELECT x, y, o
      FROM UNNEST(ARRAY<STRUCT<x INT64, y STRING>>[(1, 'a'), (2, 'b'), (3, 'c')])
        WITH OFFSET AS o
      ORDER BY o
    expected:
      rows:
        - [1, 'a', 0]
        - [2, 'b', 1]
        - [3, 'c', 2]
