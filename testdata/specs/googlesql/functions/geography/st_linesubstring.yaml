spec: docs/specs/googlesql/functions/geography/st_linesubstring.md
dialect: googlesql
# Auto-generated from the spec's upstream Examples section.
# Source: docs/third_party/googlesql-docs/geography_functions.md
cases:
  - desc: upstream example 1
    sql: |-
      WITH data AS (
        SELECT ST_GEOGFROMTEXT('LINESTRING(20 70, 70 60, 10 70, 70 70)') AS geo1
      )
      SELECT ST_LINESUBSTRING(geo1, 0.5, 1) AS segment
      FROM data
    expected:
      rows:
        - ['LINESTRING(49.4760661523471 67.2419539103851, 10 70, 70 70)']
  - desc: upstream example 2
    sql: |-
      WITH data AS (
        SELECT ST_GEOGFROMTEXT('LINESTRING(20 70, 70 60, 10 70, 70 70)') AS geo1
      )
      SELECT ST_LINESUBSTRING(geo1, 0.5, 0.5) AS segment
      FROM data
    expected:
      rows:
        - ['POINT(49.4760661523471 67.2419539103851)']
