spec: docs/specs/googlesql/functions/geography/st_startpoint.md
dialect: googlesql
cases:
  - desc: First vertex of linestring
    sql: |-
      SELECT ST_ASGEOJSON(ST_STARTPOINT(ST_GEOGFROMTEXT('LINESTRING(0 0, 1 0, 2 0)')))
    expected:
      rows:
        - ['{"type":"Point","coordinates":[0,0]}']
