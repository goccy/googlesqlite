spec: docs/specs/googlesql/functions/geography/st_isclosed.md
dialect: googlesql
cases:
  - desc: closed linestring
    sql: |-
      SELECT ST_ISCLOSED(ST_GEOGFROMTEXT('LINESTRING(0 0, 1 0, 1 1, 0 0)'))
    expected:
      rows:
        - [true]
  - desc: open linestring
    sql: |-
      SELECT ST_ISCLOSED(ST_GEOGFROMTEXT('LINESTRING(0 0, 1 0)'))
    expected:
      rows:
        - [false]
