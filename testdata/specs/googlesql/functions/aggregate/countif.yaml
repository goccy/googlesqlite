spec: docs/specs/googlesql/functions/aggregate/countif.md
dialect: googlesql
cases:
  - desc: count truthy values
    sql: SELECT COUNTIF(x > 2) FROM UNNEST([1, 2, 3, 4]) AS x
    expected:
      rows:
        - [2]
  - desc: countif of empty input is zero
    sql: SELECT COUNTIF(x > 2) FROM UNNEST(CAST([] AS ARRAY<INT64>)) AS x
    expected:
      rows:
        - [0]
