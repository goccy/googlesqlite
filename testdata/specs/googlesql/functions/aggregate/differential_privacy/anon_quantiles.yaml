spec: docs/specs/googlesql/functions/aggregate/differential_privacy/anon_quantiles.md
dialect: googlesql
# Source: docs/third_party/googlesql-docs/aggregate-dp-functions.md
cases:
  - desc: upstream example 1 — ANON_QUANTILES with noise (eps=10)
    setup:
      - >-
        CREATE TABLE professors (id INT64, item STRING, quantity INT64)
        OPTIONS(anonymization_userid_column='id')
      - >-
        INSERT INTO professors VALUES
        (101, "pencil", 24),
        (123, "pen", 16),
        (123, "pencil", 10),
        (123, "pencil", 38),
        (101, "pen", 19),
        (101, "pen", 23),
        (130, "scissors", 8),
        (150, "pencil", 72)
    sql: |-
      SELECT
        WITH ANONYMIZATION
          OPTIONS(epsilon=10, delta=.01, max_groups_contributed=1)
          item,
          ANON_QUANTILES(quantity, 4 CLAMPED BETWEEN 0 AND 100) AS quantiles_requested
      FROM professors
      GROUP BY item
    nondeterministic: true
    expected:
      rows:
        - ['pen', '[6.409375,20.647684733072918,41.40625,67.30848524305556,99.80078125]']
        - ['pencil', '[6.849259,44.010416666666664,62.64204,65.83806818181819,98.59375]']
