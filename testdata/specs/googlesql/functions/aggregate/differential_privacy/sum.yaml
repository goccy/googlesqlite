spec: docs/specs/googlesql/functions/aggregate/differential_privacy/sum.md
dialect: googlesql
cases:
  - desc: high-epsilon DP SUM lands within 5 of the true total
    sql: |-
      SELECT ABS(CAST((SELECT WITH DIFFERENTIAL_PRIVACY OPTIONS(epsilon=1000, delta=0.01, privacy_unit_column=x) SUM(x, contribution_bounds_per_group=>(0, 10)) FROM UNNEST([1,2,3]) AS x) AS INT64) - 6) <= 5
    expected:
      rows:
        - [true]
