spec: docs/specs/googlesql/functions/aggregate/differential_privacy/anon_sum.md
dialect: googlesql
# Source: docs/third_party/googlesql-docs/aggregate-dp-functions.md
#
# Example 1 is marked nondeterministic — the docs themselves note
# "These results will change each time you run the query"; the
# spec runner only verifies the query executes for those. Example
# 2 (high epsilon) is asserted exactly.
cases:
  - desc: upstream example 1 — ANON_SUM with noise (eps=10)
    setup:
      - >-
        CREATE TABLE professors (id INT64, item STRING, quantity INT64)
        OPTIONS(anonymization_userid_column='id')
      - >-
        INSERT INTO professors VALUES
        (101, "pencil", 24),
        (123, "pen", 16),
        (123, "pencil", 10),
        (123, "pencil", 38),
        (101, "pen", 19),
        (101, "pen", 23),
        (130, "scissors", 8),
        (150, "pencil", 72)
    sql: |-
      SELECT
        WITH ANONYMIZATION
          OPTIONS(epsilon=10, delta=.01, max_groups_contributed=1)
          item,
          ANON_SUM(quantity CLAMPED BETWEEN 0 AND 100) AS quantity
      FROM professors
      GROUP BY item
    nondeterministic: true
    expected:
      rows:
        - ['pencil', '143']
        - ['pen', '59']

  - desc: upstream example 2 — ANON_SUM without noise
    setup:
      - >-
        CREATE TABLE professors (id INT64, item STRING, quantity INT64)
        OPTIONS(anonymization_userid_column='id')
      - >-
        INSERT INTO professors VALUES
        (101, "pencil", 24),
        (123, "pen", 16),
        (123, "pencil", 10),
        (123, "pencil", 38),
        (101, "pen", 19),
        (101, "pen", 23),
        (130, "scissors", 8),
        (150, "pencil", 72)
    sql: |-
      SELECT
        WITH ANONYMIZATION
          OPTIONS(epsilon=1e20, delta=.01, max_groups_contributed=1)
          item,
          ANON_SUM(quantity) AS quantity
      FROM professors
      GROUP BY item
    expected:
      unordered: true
      rows:
        - ['scissors', '8']
        - ['pencil', '144']
        - ['pen', '58']
