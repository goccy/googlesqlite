spec: docs/specs/googlesql/functions/aggregate/differential_privacy/anon_var_pop.md
dialect: googlesql
# Source: docs/third_party/googlesql-docs/aggregate-dp-functions.md
#
# Upstream only shows the noisy `epsilon=10` Example, so we mark
# it nondeterministic (verify the query runs without error; do not
# assert the specific noise realization).
cases:
  - desc: upstream example 1 — ANON_VAR_POP with noise (eps=10)
    setup:
      - >-
        CREATE TABLE professors (id INT64, item STRING, quantity INT64)
        OPTIONS(anonymization_userid_column='id')
      - >-
        INSERT INTO professors VALUES
        (101, "pencil", 24),
        (123, "pen", 16),
        (123, "pencil", 10),
        (123, "pencil", 38),
        (101, "pen", 19),
        (101, "pen", 23),
        (130, "scissors", 8),
        (150, "pencil", 72)
    sql: |-
      SELECT
        WITH ANONYMIZATION
          OPTIONS(epsilon=10, delta=.01, max_groups_contributed=1)
          item,
          ANON_VAR_POP(quantity CLAMPED BETWEEN 0 AND 100) AS pop_variance
      FROM professors
      GROUP BY item
    nondeterministic: true
    expected:
      rows:
        - ['pencil', '642']
        - ['pen', '2.6666666666665']
        - ['scissors', '2500']
