spec: docs/specs/googlesql/functions/aggregate/differential_privacy/anon_count.md
dialect: googlesql
# Source: docs/third_party/googlesql-docs/aggregate-dp-functions.md
#
# Every case seeds the `professors` source table from the upstream
# `dp_example_tables` definition. The eps=10 Examples carry the
# `nondeterministic: true` flag because the docs themselves note
# "These results will change each time you run the query" — those
# specific row values are a single noise realization. The eps=1e20
# Examples are deterministic and assert exact values.
cases:
  - desc: upstream example 1 — ANON_COUNT(*) with noise (eps=10)
    setup:
      - >-
        CREATE TABLE professors (id INT64, item STRING, quantity INT64)
        OPTIONS(anonymization_userid_column='id')
      - >-
        INSERT INTO professors VALUES
        (101, "pencil", 24),
        (123, "pen", 16),
        (123, "pencil", 10),
        (123, "pencil", 38),
        (101, "pen", 19),
        (101, "pen", 23),
        (130, "scissors", 8),
        (150, "pencil", 72)
    sql: |-
      SELECT
        WITH ANONYMIZATION
          OPTIONS(epsilon=10, delta=.01, max_groups_contributed=1)
          item,
          ANON_COUNT(*) AS times_requested
      FROM professors
      GROUP BY item
    nondeterministic: true
    expected:
      rows:
        - ['pencil', '5']
        - ['pen', '2']

  - desc: upstream example 2 — ANON_COUNT(*) without noise
    setup:
      - >-
        CREATE TABLE professors (id INT64, item STRING, quantity INT64)
        OPTIONS(anonymization_userid_column='id')
      - >-
        INSERT INTO professors VALUES
        (101, "pencil", 24),
        (123, "pen", 16),
        (123, "pencil", 10),
        (123, "pencil", 38),
        (101, "pen", 19),
        (101, "pen", 23),
        (130, "scissors", 8),
        (150, "pencil", 72)
    sql: |-
      SELECT
        WITH ANONYMIZATION
          OPTIONS(epsilon=1e20, delta=.01, max_groups_contributed=1)
          item,
          ANON_COUNT(*) AS times_requested
      FROM professors
      GROUP BY item
    expected:
      unordered: true
      rows:
        - ['scissors', '1']
        - ['pencil', '4']
        - ['pen', '3']

  - desc: upstream example 3 — ANON_COUNT(item CLAMPED) with noise (eps=10)
    setup:
      - >-
        CREATE TABLE professors (id INT64, item STRING, quantity INT64)
        OPTIONS(anonymization_userid_column='id')
      - >-
        INSERT INTO professors VALUES
        (101, "pencil", 24),
        (123, "pen", 16),
        (123, "pencil", 10),
        (123, "pencil", 38),
        (101, "pen", 19),
        (101, "pen", 23),
        (130, "scissors", 8),
        (150, "pencil", 72)
    sql: |-
      SELECT
        WITH ANONYMIZATION
          OPTIONS(epsilon=10, delta=.01, max_groups_contributed=1)
          item,
          ANON_COUNT(item CLAMPED BETWEEN 0 AND 100) AS times_requested
      FROM professors
      GROUP BY item
    nondeterministic: true
    expected:
      rows:
        - ['pencil', '5']
        - ['pen', '2']

  - desc: upstream example 4 — ANON_COUNT(item CLAMPED) without noise
    setup:
      - >-
        CREATE TABLE professors (id INT64, item STRING, quantity INT64)
        OPTIONS(anonymization_userid_column='id')
      - >-
        INSERT INTO professors VALUES
        (101, "pencil", 24),
        (123, "pen", 16),
        (123, "pencil", 10),
        (123, "pencil", 38),
        (101, "pen", 19),
        (101, "pen", 23),
        (130, "scissors", 8),
        (150, "pencil", 72)
    sql: |-
      SELECT
        WITH ANONYMIZATION
          OPTIONS(epsilon=1e20, delta=.01, max_groups_contributed=1)
          item,
          ANON_COUNT(item CLAMPED BETWEEN 0 AND 100) AS times_requested
      FROM professors
      GROUP BY item
    expected:
      unordered: true
      rows:
        - ['scissors', '1']
        - ['pencil', '4']
        - ['pen', '3']
