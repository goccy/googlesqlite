spec: docs/specs/googlesql/functions/aggregate/sum.md
dialect: googlesql
cases:
  - desc: sum integers
    sql: SELECT SUM(x) FROM UNNEST([1, 2, 3, 4]) AS x
    expected:
      rows:
        - [10]
  - desc: empty unnest sum is null
    sql: SELECT SUM(x) FROM UNNEST(CAST([] AS ARRAY<INT64>)) AS x
    expected:
      rows:
        - [null]
