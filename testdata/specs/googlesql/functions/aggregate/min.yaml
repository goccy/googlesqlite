spec: docs/specs/googlesql/functions/aggregate/min.md
dialect: googlesql
cases:
  - desc: min of integers
    sql: SELECT MIN(x) FROM UNNEST([3, 1, 5, 2]) AS x
    expected:
      rows:
        - [1]
  - desc: empty input returns NULL
    sql: SELECT MIN(x) FROM UNNEST(CAST([] AS ARRAY<INT64>)) AS x
    expected:
      rows:
        - [null]
