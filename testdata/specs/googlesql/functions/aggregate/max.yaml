spec: docs/specs/googlesql/functions/aggregate/max.md
dialect: googlesql
cases:
  - desc: max of integers
    sql: SELECT MAX(x) FROM UNNEST([3, 1, 5, 2]) AS x
    expected:
      rows:
        - [5]
  - desc: empty input returns NULL
    sql: SELECT MAX(x) FROM UNNEST(CAST([] AS ARRAY<INT64>)) AS x
    expected:
      rows:
        - [null]
