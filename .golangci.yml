version: "2"

run:
  timeout: 30m

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  exclusions:
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - vendor
      - testdata
      - docs/third_party
      # The bulk of internal/ was ported wholesale from the predecessor
      # for parity. Style refactors come in a later pass once the test
      # suite is green; until then we suppress noise from that ported
      # code. New packages (spectest, specmeta, sqlitex) are exempt
      # from this exclusion below.
      - "internal/[^/]+\\.go$"

formatters:
  enable:
    - gofmt
    - goimports
